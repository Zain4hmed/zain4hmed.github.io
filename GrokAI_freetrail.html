<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>AI Chat</title>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* BASE */

body{
margin:0;
font-family:system-ui,-apple-system,Segoe UI,Roboto;
background:#1f1f1f;
color:#e4e4e4;
}

/* HEADER */

.header{
height:60px;
background:#181818;
display:flex;
align-items:center;
padding-left:24px;
border-bottom:1px solid #333;
font-size:18px;
}


/* CHAT AREA */

.chat{

max-width:1000px;
margin:auto;
padding:20px 20px 140px;

}

/* TABLES (ChatGPT Style) */

.ai table{

border-collapse:collapse;

margin:20px 0;

width:100%;

font-size:14px;

background:#1b1b1b;

border-radius:10px;

overflow:hidden;

}


/* TABLE HEADER */

.ai th{

text-align:left;

padding:10px;

background:#242424;

border-bottom:1px solid #333;

font-weight:600;

}


/* TABLE CELLS */

.ai td{

padding:10px;

border-bottom:1px solid #333;

}


/* LAST ROW */

.ai tr:last-child td{
border-bottom:none;
}


/* ROW HOVER */

.ai tr:hover{

background:#252525;

}

/* LANDING SCREEN */

.landing{

text-align:center;
margin-top:140px;

}

.landing h1{
font-weight:500;
}


/* USER BUBBLE */

.user{

display:flex;
justify-content:flex-end;
margin:12px 0;

}

.userBubble{

background:#2f7cf6;
padding:12px 18px;
border-radius:18px;
max-width:520px;
color:white;

}


/* AI TEXT */

.ai{

margin:16px 0;
line-height:1.6;
font-size:15px;

}


/* CODE BLOCK */

.ai pre{

background:#111;

padding:14px;

border-radius:12px;

border:1px solid #333;

overflow-x:auto;

position:relative;

}


/* CODE TEXT */

.ai code{
color:#9cdcfe;
}


/* COPY BUTTON */

.copyBtn{

position:absolute;

top:8px;
right:10px;

cursor:pointer;

opacity:.6;

font-size:14px;

}

.copyBtn:hover{
opacity:1;
}



/* INPUT */

.inputArea{

position:fixed;
bottom:25px;
left:0;
right:0;

}


.inputBox{

max-width:760px;
margin:auto;

display:flex;

background:#2a2a2a;

border-radius:40px;

padding:8px;

border:1px solid #333;

box-shadow:0px 5px 25px rgba(0,0,0,.4);

}


input{

flex:1;
border:none;
background:transparent;
color:white;
padding:12px;
font-size:16px;
outline:none;

}


button{

border:none;
background:transparent;
color:white;
cursor:pointer;

}

</style>

</head>


<body>


<div class="header">
AI Chat
</div>



<div id="chat" class="chat">


<div id="landing" class="landing">

<h1>

What’s on your mind today?

</h1>

</div>


</div>



<div class="inputArea">

<div class="inputBox">

<input id="prompt" placeholder="Ask anything"/>

<button onclick="sendMessage()">

<i class="fa-solid fa-circle-play" style="font-size:1.8rem;"></i>

</button>

</div>

</div>



<script>


async function sendMessage(){

const input=document.getElementById("prompt");

const text=input.value.trim();

if(!text)return;

const chat=document.getElementById("chat");


/* REMOVE LANDING */

const landing=document.getElementById("landing");

if(landing) landing.remove();


/* USER MESSAGE */

chat.innerHTML+=`

<div class="user">

<div class="userBubble">

${text}

</div>

</div>

`;


input.value="";


const id="ai"+Date.now();


/* LOADING */

chat.innerHTML+=`

<div class="ai" id="${id}">

Thinking...

</div>

`;


/* SCROLL */

window.scrollTo(0,document.body.scrollHeight);



/* API CALL */

const response=await fetch(

"https://api.groq.com/openai/v1/chat/completions",

{

method:"POST",

headers:{

"Authorization":"Bearer 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",

"Content-Type":"application/json"

},

body:JSON.stringify({

model:"openai/gpt-oss-120b",

messages:[
{
role:"user",
content:text
}
]

})

}

);


const data=await response.json();


if(!data.choices){

document.getElementById(id).innerHTML="API Error";

return;

}


const html=marked.parse(data.choices[0].message.content);


/* INSERT RESPONSE */

document.getElementById(id).innerHTML=html;


/* ADD COPY BUTTONS */

setTimeout(addCopyButtons,50);


window.scrollTo(0,document.body.scrollHeight);

}



/* ENTER SEND */

document.getElementById("prompt")

.addEventListener("keydown",function(e){

if(e.key==="Enter"){

e.preventDefault();
sendMessage();

}

});



/* COPY BUTTONS */

function addCopyButtons(){

document.querySelectorAll("pre").forEach(block=>{

if(block.querySelector(".copyBtn")) return;

const btn=document.createElement("div");

btn.className="copyBtn";

btn.innerHTML='<i class="fa-regular fa-copy"></i>';

btn.onclick=function(){

navigator.clipboard.writeText(block.innerText);

btn.innerHTML='<i class="fa-solid fa-check"></i>';

setTimeout(()=>{

btn.innerHTML='<i class="fa-regular fa-copy"></i>';

},1000);

};

block.appendChild(btn);

});

}


</script>


</body>

</html>
